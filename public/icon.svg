<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0C29"/>
      <stop offset="50%" style="stop-color:#302B63"/>
      <stop offset="100%" style="stop-color:#24243E"/>
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDC4"/>
      <stop offset="100%" style="stop-color:#45B7D1"/>
    </linearGradient>
    <linearGradient id="book" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FF9F68"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#fff" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Book body -->
  <rect x="130" y="155" width="252" height="210" rx="16" fill="url(#book)" opacity="0.95"/>
  <!-- Book spine -->
  <rect x="130" y="155" width="36" height="210" rx="10" fill="#c04a1a"/>
  <!-- Book pages right side -->
  <rect x="170" y="165" width="202" height="190" rx="8" fill="#fff" opacity="0.12"/>
  <!-- Lines on book -->
  <rect x="185" y="205" width="140" height="8" rx="4" fill="#fff" opacity="0.4"/>
  <rect x="185" y="228" width="120" height="8" rx="4" fill="#fff" opacity="0.3"/>
  <rect x="185" y="251" width="130" height="8" rx="4" fill="#fff" opacity="0.3"/>
  <rect x="185" y="274" width="100" height="8" rx="4" fill="#fff" opacity="0.2"/>
  <rect x="185" y="297" width="115" height="8" rx="4" fill="#fff" opacity="0.2"/>

  <!-- Star badge top-right -->
  <circle cx="370" cy="158" r="52" fill="url(#star)" opacity="0.95"/>
  <circle cx="370" cy="158" r="44" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <!-- Star shape -->
  <polygon points="370,122 379,148 407,148 384,164 393,190 370,175 347,190 356,164 333,148 361,148"
    fill="#fff" opacity="0.95"/>

  <!-- Cap on top -->
  <rect x="196" y="128" width="120" height="18" rx="9" fill="#4ECDC4"/>
  <rect x="240" y="110" width="32" height="22" rx="6" fill="#4ECDC4"/>
  <!-- Cap button -->
  <circle cx="256" cy="108" r="8" fill="#FFEAA7"/>

  <!-- "LH" text -->
  <text x="256" y="420" font-family="Arial Black, sans-serif" font-size="62" font-weight="900"
    fill="#fff" text-anchor="middle" opacity="0.9" letter-spacing="2">LernHeld</text>
</svg>
